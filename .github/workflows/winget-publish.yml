name: Publish to WinGet

on:
  release:
    types: [published]

jobs:
  winget:
    runs-on: windows-latest
    steps:
      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install wingetcreate
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Update and submit winget manifest
        shell: pwsh
        continue-on-error: true
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $url = "https://github.com/PranavPeshwe/cli-explainer/releases/download/v${version}/cli-explainer-win-x64.zip"
          ./wingetcreate.exe update PranavPeshwe.CliExplainer `
            --urls $url `
            --version $version `
            --submit `
            --token ${{ secrets.WINGET_TOKEN }}
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "wingetcreate update failed. If this is the first release, submit manually to winget-pkgs."
            exit 1
          }
