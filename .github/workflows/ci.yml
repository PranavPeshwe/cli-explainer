name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore CliExplainer.slnx

      - name: Build
        run: dotnet build CliExplainer.slnx -c Release --no-restore

      - name: Run unit tests
        run: dotnet test CliExplainer.slnx --filter "Category!=Integration" --no-build -c Release --verbosity normal

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: win-x64
            artifact: cli-explainer-win-x64
          - rid: linux-x64
            artifact: cli-explainer-linux-x64
          - rid: osx-arm64
            artifact: cli-explainer-osx-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish ${{ matrix.rid }}
        run: dotnet publish src/CliExplainer/CliExplainer.csproj -c Release -r ${{ matrix.rid }} -o publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/${{ matrix.rid }}/

  release:
    needs: publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create zip archives
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$dir"
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          gh release create "$TAG" \
            --title "Build ${GITHUB_SHA::7}" \
            --notes "Automated build from commit ${GITHUB_SHA}." \
            --latest \
            cli-explainer-*.zip
