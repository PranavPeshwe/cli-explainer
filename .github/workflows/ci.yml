name: CI

on:
  push:
    branches: ["*"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore CliExplainer.sln

      - name: Build
        run: dotnet build CliExplainer.sln -c Release --no-restore

      - name: Run unit tests
        run: dotnet test CliExplainer.sln --filter "Category!=Integration" --no-build -c Release --verbosity normal

  publish:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: win-x64
            artifact: cli-explainer-win-x64
          - rid: linux-x64
            artifact: cli-explainer-linux-x64
          - rid: osx-arm64
            artifact: cli-explainer-osx-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish ${{ matrix.rid }}
        run: |
          dotnet publish src/CliExplainer/CliExplainer.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/${{ matrix.rid }}/

  release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create flat zip archives
        run: |
          for dir in artifacts/*/; do
            name="$(basename "$dir")"
            (cd "$dir" && zip -r "../../${name}.zip" .)
          done

      - name: Compute SHA256 checksums
        run: |
          echo "### SHA256 Checksums" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          sha256sum cli-explainer-*.zip >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "v${{ steps.version.outputs.VERSION }}" \
            --generate-notes \
            --latest \
            cli-explainer-*.zip

  winget-update:
    needs: release
    runs-on: windows-latest
    steps:
      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install wingetcreate
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Update and submit winget manifest
        shell: pwsh
        continue-on-error: true
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $url = "https://github.com/PranavPeshwe/cli-explainer/releases/download/v${version}/cli-explainer-win-x64.zip"
          ./wingetcreate.exe update PranavPeshwe.CliExplainer `
            --urls $url `
            --version $version `
            --submit `
            --token ${{ secrets.WINGET_TOKEN }}
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "wingetcreate update failed. If this is the first release, submit manually to winget-pkgs."
            exit 1
          }
