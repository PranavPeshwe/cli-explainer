ShortDescription: Explains terminal/CLI errors in plain English using an LLM via GitHub Copilot SDK
Description: |-
  A lightweight .NET 8 console application that explains terminal/CLI errors in plain English
  and provides actionable fixes. It sends error output to an LLM via the GitHub Copilot SDK,
  then enters an interactive prompt loop for follow-up questions. Supports piped input, file
  input, and direct subprocess execution.
